name: Build GKI android12-5.10 ReSukiSU Built-in + KPM

on:
  workflow_dispatch:

jobs:
  build:
    name: Build GKI android12-5.10 (ReSukiSU + KPM)
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git python3 python3-pip bc flex bison \
            libssl-dev libelf-dev zip unzip rsync cpio \
            binutils build-essential gcc make file curl wget \
            libncurses-dev gawk openssl pahole

      - name: Maximize disk space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout ReSukiSU v4.1.0
        uses: actions/checkout@v4
        with:
          repository: ReSukiSU/ReSukiSU
          ref: v4.1.0
          path: ReSukiSU
          fetch-depth: 0

      - name: Fix git safe.directory + patch Kbuild KSU_VERSION fallback
        run: |
          git config --global --add safe.directory '*'

          python3 << 'PYEOF'
          import sys
          kbuild_path = 'ReSukiSU/kernel/Kbuild'
          with open(kbuild_path, 'r') as f:
              content = f.read()
          target = 'ccflags-y += -DKSU_VERSION=$(KSU_VERSION)'
          if target not in content:
              print('ERROR: target line not found in Kbuild!')
              sys.exit(1)
          if 'KSU_VERSION_FALLBACK_INSERTED' in content:
              print('Already patched.')
          else:
              fallback_lines = [
                  '# KSU_VERSION_FALLBACK_INSERTED',
                  'ifeq ($(KSU_VERSION),)',
                  'KSU_VERSION := 40000',
                  '$(warning -- KSU_VERSION was empty; using fallback 40000)',
                  'endif',
                  '',
              ]
              fallback = '\n'.join(fallback_lines) + '\n'
              content = content.replace(target, fallback + target)
              with open(kbuild_path, 'w') as f:
                  f.write(content)
              print('Kbuild patched OK')
          PYEOF

      - name: Setup repo tool
        run: |
          mkdir -p ~/.bin
          curl -fsSLo ~/.bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod +x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Sync android12-5.10 kernel via repo
        run: |
          set -euo pipefail
          mkdir src && cd src
          repo init --depth=1 \
            -u https://android.googlesource.com/kernel/manifest \
            -b common-android12-5.10 \
            --repo-rev=stable \
            --no-clone-bundle
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle
          head -5 common/Makefile
          ls build/build.sh && echo "build.sh OK"

      - name: Integrate ReSukiSU + KPM into kernel
        run: |
          set -euo pipefail
          cd src
          ln -sf $GITHUB_WORKSPACE/ReSukiSU/kernel common/drivers/kernelsu
          grep -q kernelsu common/drivers/Makefile || \
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> common/drivers/Makefile
          grep -q kernelsu common/drivers/Kconfig || \
            sed -i '/^endmenu/i source "drivers/kernelsu/Kconfig"' common/drivers/Kconfig
          echo "Integrate done:"
          grep kernelsu common/drivers/Makefile

      - name: Build GKI kernel (LTO=none to keep kprobe symbols stable)
        run: |
          set -euo pipefail
          cd src
          export ROOT_DIR=$(pwd)
          export KERNEL_DIR=common
          export OUT_DIR=$GITHUB_WORKSPACE/out
          export BUILD_CONFIG=common/build.config.gki.aarch64
          export LTO=none
          export CONFIG_KSU=y
          export CONFIG_KSU_MANUAL_SU=y
          export CONFIG_KPM=y
          export CONFIG_KALLSYMS=y
          export CONFIG_KALLSYMS_ALL=y
          export CONFIG_KSU_MULTI_MANAGER_SUPPORT=y
          export CONFIG_KPROBES=y
          export CONFIG_KPROBE_EVENTS=y
          export KMI_SYMBOL_LIST_STRICT_MODE=0
          build/build.sh 2>&1 | tee $GITHUB_WORKSPACE/build.log
          echo "=== Build done ==="

      - name: Verify Image exists
        run: |
          ls -lh $GITHUB_WORKSPACE/out/dist/Image
          file $GITHUB_WORKSPACE/out/dist/Image

      - name: Package AnyKernel3
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          cat > AnyKernel3/anykernel.sh << 'AKEOF'
          properties() { '
          kernel.string=ReSukiSU v4.1.0 + KPM GKI Built-in - mondrian android12-5.10
          do.devicecheck=0
          do.modules=0
          do.cleanup=1
          do.cleanuponabort=0
          '; }
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          split_boot;
          flash_boot;
          AKEOF
          cp $GITHUB_WORKSPACE/out/dist/Image AnyKernel3/Image
          ls -lh AnyKernel3/Image
          cd AnyKernel3
          zip -r9 $GITHUB_WORKSPACE/ReSukiSU_v4.1.0_KPM_GKI_android12-5.10_mondrian.zip . -x '.git*'
          ls -lh $GITHUB_WORKSPACE/ReSukiSU_v4.1.0_KPM_GKI_android12-5.10_mondrian.zip

      - name: Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-v4.1.0-KPM-GKI-android12-5.10-builtin-mondrian
          path: ReSukiSU_v4.1.0_KPM_GKI_android12-5.10_mondrian.zip
          retention-days: 14

      - name: Upload raw Image
        uses: actions/upload-artifact@v4
        with:
          name: GKI-Image-android12-5.10-KPM
          path: out/dist/Image
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3
