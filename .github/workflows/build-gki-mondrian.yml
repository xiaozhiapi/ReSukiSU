name: Build GKI android12-5.10 ReSukiSU Built-in + KPM

on:
  workflow_dispatch:

jobs:
  build:
    name: Build GKI android12-5.10 (ReSukiSU + KPM)
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Maximize disk space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git python3 python3-pip bc flex bison \
            libssl-dev libelf-dev zip unzip rsync cpio \
            binutils build-essential gcc make file curl wget \
            libncurses-dev gawk openssl pahole

      - name: Checkout ReSukiSU v4.1.0
        uses: actions/checkout@v4
        with:
          ref: v4.1.0
          path: ReSukiSU

      - name: Clone android12-5.10 kernel source (direct git)
        run: |
          echo "Cloning kernel/common android12-5.10..."
          git clone --depth=1 \
            https://android.googlesource.com/kernel/common \
            -b android12-5.10 \
            kernel/common
          echo "Kernel version:"
          cat kernel/common/Makefile | head -5

          echo "Cloning build tools..."
          git clone --depth=1 \
            https://android.googlesource.com/kernel/build \
            kernel/build

          echo "Cloning prebuilt clang..."
          git clone --depth=1 \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            -b android12-5.10 \
            prebuilts/clang/host/linux-x86 || \
          git clone --depth=1 \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            -b master \
            prebuilts/clang/host/linux-x86

          echo "Cloning prebuilt gcc..."
          git clone --depth=1 \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9

          echo "Cloning build tools prebuilts..."
          git clone --depth=1 \
            https://android.googlesource.com/platform/prebuilts/build-tools \
            prebuilts/build-tools

      - name: Integrate ReSukiSU + KPM into kernel
        run: |
          ln -sf $GITHUB_WORKSPACE/ReSukiSU/kernel kernel/common/drivers/kernelsu
          grep -q kernelsu kernel/common/drivers/Makefile || \
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> kernel/common/drivers/Makefile
          grep -q kernelsu kernel/common/drivers/Kconfig || \
            sed -i '/^endmenu/i source "drivers/kernelsu/Kconfig"' kernel/common/drivers/Kconfig
          SYMLIST=kernel/common/android/abi_gki_aarch64_core
          if [ -f "$SYMLIST" ]; then
            for sym in ksu_handle_faccessat ksu_handle_stat ksu_handle_execveat \
                       ksu_handle_newfstatat kallsyms_lookup_name; do
              grep -qxF "$sym" "$SYMLIST" || echo "$sym" >> "$SYMLIST"
            done
          fi
          echo "Integration OK"
          grep kernelsu kernel/common/drivers/Makefile

      - name: Build GKI kernel
        run: |
          export ROOT_DIR=$GITHUB_WORKSPACE
          export KERNEL_DIR=kernel/common
          export OUT_DIR=$GITHUB_WORKSPACE/out
          export BUILD_CONFIG=kernel/common/build.config.gki.aarch64
          export LTO=thin
          export CONFIG_KSU=y
          export CONFIG_KSU_MANUAL_SU=y
          export CONFIG_KPM=y
          export CONFIG_KALLSYMS=y
          export CONFIG_KALLSYMS_ALL=y
          export CONFIG_KSU_MULTI_MANAGER_SUPPORT=y

          cd $GITHUB_WORKSPACE
          kernel/build/build.sh 2>&1 | tee build.log | tail -40

      - name: Check build output
        run: |
          ls -lh out/dist/ 2>/dev/null || ls -lh out/ || echo "no out"
          [ -f out/dist/Image ] && echo "Image: $(du -sh out/dist/Image | cut -f1)" || true

      - name: Package AnyKernel3
        if: success()
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          cat > AnyKernel3/anykernel.sh << 'AKEOF'
          properties() { '
          kernel.string=ReSukiSU v4.1.0 + KPM GKI Built-in - mondrian android12-5.10
          do.devicecheck=0
          do.modules=0
          do.cleanup=1
          do.cleanuponabort=0
          '; }
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          split_boot;
          flash_boot;
          AKEOF
          [ -f out/dist/Image ] && cp out/dist/Image AnyKernel3/Image
          [ -f out/dist/Image.lz4 ] && cp out/dist/Image.lz4 AnyKernel3/Image.lz4
          cd AnyKernel3
          zip -r9 $GITHUB_WORKSPACE/ReSukiSU_v4.1.0_KPM_GKI_android12-5.10_mondrian.zip . -x '.git*'

      - name: Upload AnyKernel3
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-v4.1.0-KPM-GKI-android12-5.10-builtin-mondrian
          path: ReSukiSU_v4.1.0_KPM_GKI_android12-5.10_mondrian.zip
          retention-days: 14

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3
