name: Build Mondrian Vendor GKI + ReSukiSU KPM

on:
  workflow_dispatch:

jobs:
  build:
    name: Mondrian Vendor GKI + ReSukiSU KPM
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git python3 bc flex bison \
            libssl-dev libelf-dev zip curl \
            binutils build-essential make file pahole \
            libncurses-dev gawk openssl \
            clang-14 llvm-14 lld-14 \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
          for t in clang llvm-ar llvm-nm llvm-objcopy llvm-objdump llvm-strip llvm-readelf; do
            sudo update-alternatives --install /usr/bin/$t $t /usr/bin/${t}-14 100 2>/dev/null || true
          done
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-14 100 2>/dev/null || true
          clang --version
          df -h

      - name: Maximize disk space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Clone Xiaomi mondrian kernel (mondrian-s-oss)
        run: |
          git clone --depth=1 -b mondrian-s-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
            kernel_source
          echo "=== Kernel base version ==="
          head -5 kernel_source/Makefile
          df -h

      - name: Checkout ReSukiSU v4.1.0
        uses: actions/checkout@v4
        with:
          repository: ReSukiSU/ReSukiSU
          ref: v4.1.0
          path: ReSukiSU
          fetch-depth: 0

      - name: Patch Kbuild KSU_VERSION fallback
        run: |
          git config --global --add safe.directory '*'
          python3 << 'PYEOF'
          import sys
          kbuild_path = 'ReSukiSU/kernel/Kbuild'
          with open(kbuild_path) as f:
              content = f.read()
          target = 'ccflags-y += -DKSU_VERSION=$(KSU_VERSION)'
          if 'KSU_VERSION_FALLBACK_INSERTED' not in content and target in content:
              fallback = '\n'.join([
                  '# KSU_VERSION_FALLBACK_INSERTED',
                  'ifeq ($(KSU_VERSION),)',
                  'KSU_VERSION := 40000',
                  '$(warning -- KSU_VERSION was empty; fallback 40000)',
                  'endif',
                  '',
              ]) + '\n'
              content = content.replace(target, fallback + target)
              with open(kbuild_path, 'w') as f:
                  f.write(content)
              print('Kbuild patched OK')
          else:
              print('Already patched or target not found, skipping')
          PYEOF

      - name: Integrate ReSukiSU into mondrian kernel
        run: |
          cp -r ReSukiSU/kernel kernel_source/drivers/kernelsu
          grep -q 'kernelsu' kernel_source/drivers/Makefile || \
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> kernel_source/drivers/Makefile
          grep -q 'kernelsu/Kconfig' kernel_source/drivers/Kconfig || \
            sed -i '/^endmenu$/i source "drivers/kernelsu/Kconfig"' kernel_source/drivers/Kconfig
          echo "Integration check: $(grep kernelsu kernel_source/drivers/Makefile)"

      - name: Fix missing Xiaomi proprietary stubs
        run: |
          cd kernel_source
          # 为 Kconfig 中引用但不存在的目录创建空 Kconfig + Makefile stub
          grep -r '^source ' --include='Kconfig' -h | sed 's/source "//;s/"//' | sort -u | while read kpath; do
            if [ ! -f "$kpath" ]; then
              echo "Kconfig stub: $kpath"
              mkdir -p "$(dirname $kpath)"
              touch "$kpath"
              # 同时创建空 Makefile（防止 make 报 No rule to make target）
              mfpath="$(dirname $kpath)/Makefile"
              [ ! -f "$mfpath" ] && touch "$mfpath"
            fi
          done
          # 同样扫描 Makefile 中 obj-y += xxx/ 但目录缺 Makefile 的情况
          grep -r 'obj-.*+=.*/' --include='Makefile' -h | grep -oP '[\w/-]+/$' | sort -u | while read subdir; do
            for base in drivers net arch; do
              fullpath="$base/$subdir"
              if [ -d "$fullpath" ] && [ ! -f "$fullpath/Makefile" ]; then
                echo "Makefile stub: $fullpath/Makefile"
                touch "$fullpath/Makefile"
              fi
            done
          done
          echo "All stubs done"

      - name: Patch Xiaomi source bugs
        run: |
          cd kernel_source
          # ── 1. ufshcd.c: 3 个 WriteBooster 函数 static↔non-static 冲突 → 统一改 non-static
          if [ -f drivers/scsi/ufs/ufshcd.c ]; then
            sed -i -E 's/^static (inline )?(void|int) (ufshcd_wb_ctrl|ufshcd_wb_toggle_flush_during_h8|ufshcd_wb_toggle_flush)\(/\2 \3(/' \
              drivers/scsi/ufs/ufshcd.c
            echo "Patched ufshcd.c wb funcs"
          fi
          # ── 2. 通用去重: 删除文件内重复定义的函数（小米补丁打重导致）
          python3 << 'PYEOF'
          import re
          # (文件, [重复函数名])
          dups = [
              ('drivers/usb/gadget/udc/core.c',
               ['usb_gadget_enable_async_callbacks', 'usb_gadget_disable_async_callbacks']),
          ]
          for path, names in dups:
              try:
                  with open(path) as f:
                      lines = f.readlines()
              except FileNotFoundError:
                  continue
              for name in names:
                  sig = re.compile(r'^\s*static\s+inline\s+\w+\s+' + re.escape(name) + r'\s*\(')
                  starts = [i for i, l in enumerate(lines) if sig.match(l)]
                  # 保留第一处，删除其后所有重复（从后往前删保持索引有效）
                  for s in reversed(starts[1:]):
                      depth = 0; seen = False; end = s
                      for j in range(s, len(lines)):
                          depth += lines[j].count('{') - lines[j].count('}')
                          if '{' in lines[j]:
                              seen = True
                          if seen and depth == 0:
                              end = j; break
                      del lines[s:end+1]
                      print(f'  removed dup {name} at line {s+1} in {path}')
              with open(path, 'w') as f:
                  f.writelines(lines)
          print('Dedup done')
          PYEOF
          echo "Source patches done"

      - name: Configure kernel (gki_defconfig + KSU/KPM, 不加载私有驱动)
        run: |
          cd kernel_source
          mkdir -p out
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang O=out gki_defconfig
          python3 << 'PYEOF'
          extra = [
              # Qualcomm SM8450 平台支持（mondrian = waipio 平台）
              'CONFIG_ARCH_WAIPIO=y',
              'CONFIG_ARCH_CAPE=y',
              # KSU + KPM
              'CONFIG_KSU=y',
              'CONFIG_KSU_MANUAL_SU=y',
              'CONFIG_KPM=y',
              'CONFIG_KALLSYMS=y',
              'CONFIG_KALLSYMS_ALL=y',
              'CONFIG_KSU_MULTI_MANAGER_SUPPORT=y',
              'CONFIG_KPROBES=y',
              'CONFIG_KPROBE_EVENTS=y',
              # 禁用 LTO（保证 kprobe 符号稳定）
              '# CONFIG_LTO_CLANG_THIN is not set',
              '# CONFIG_LTO_CLANG_FULL is not set',
              'CONFIG_LTO_NONE=y',
          ]
          with open('out/.config', 'a') as f:
              f.write('\n'.join(extra) + '\n')
          print('Configs appended')
          PYEOF
          yes "" | make ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang O=out olddefconfig
          echo "=== Key configs ==="
          grep -E 'CONFIG_KSU|CONFIG_KPM|CONFIG_KALLSYMS_ALL|CONFIG_LTO|CONFIG_ARCH_WAIPIO' out/.config

      - name: Build kernel Image (LTO=none keeps kprobe symbols stable)
        run: |
          cd kernel_source
          # -Wno-error: 把小米源码里一大类"警告当错误"放行，避免逐个修
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            KCFLAGS="-Wno-error -Wno-unused-variable -Wno-unused-function" \
            O=out -j$(nproc) \
            Image 2>&1 | tee $GITHUB_WORKSPACE/build.log
          echo "=== Build complete ==="
          ls -lh out/arch/arm64/boot/Image
          file out/arch/arm64/boot/Image

      - name: Verify KSU symbols in Image
        run: |
          if strings kernel_source/out/arch/arm64/boot/Image | grep -qiE 'kernelsu|ksu_handle|SukiSU'; then
            echo "KSU symbols found in Image - OK"
          else
            echo "WARNING: KSU symbols not detected"
          fi

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          cp kernel_source/out/arch/arm64/boot/Image AnyKernel3/
          python3 << 'PYEOF'
          content = '''# AnyKernel3 - mondrian ReSukiSU Vendor GKI
          properties() { '
          kernel.string=ReSukiSU v4.1.0 KPM Mondrian Vendor GKI
          do.devicecheck=0
          do.modules=0
          do.cleanup=1
          do.cleanuponabort=0
          '; }
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          split_boot;
          flash_boot;
          '''
          # Remove leading whitespace from each line
          lines = [l.lstrip() for l in content.split('\n')]
          with open('AnyKernel3/anykernel.sh', 'w') as f:
              f.write('\n'.join(lines))
          print('anykernel.sh written')
          PYEOF
          cd AnyKernel3
          zip -r9 ../ReSukiSU_v4.1.0_KPM_LTO_none_mondrian_vendor.zip . -x '.git*'
          ls -lh ../ReSukiSU_v4.1.0_KPM_LTO_none_mondrian_vendor.zip

      - name: Upload AnyKernel3 zip
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-v4.1.0-KPM-Mondrian-Vendor
          path: ReSukiSU_v4.1.0_KPM_LTO_none_mondrian_vendor.zip
          retention-days: 14

      - name: Upload raw Image
        uses: actions/upload-artifact@v4
        with:
          name: Mondrian-Vendor-GKI-Image
          path: kernel_source/out/arch/arm64/boot/Image
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3
